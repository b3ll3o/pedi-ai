      GLOBAL_S3_BUCKET: stub
    ports:
      - "54321:5000"
    volumes:
      - storage_data:/var/lib/storage
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  studio:
    image: supabase/studio:20240612-91ff7a2
    container_name: pedi-ai-studio
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyYmVna2l6aWxzb29tbHh0YXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTg3MDgsImV4cCI6MjA5MjQzNDcwOH0.fR3lsLvDWpndHQAtcCI7yNcAs7hKdAoi0pG-gKeSGdE
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyYmVna2l6aWxzb29tbHh0YXd3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njg1ODcwOCwiZXhwIjoyMDkyNDM0NzA4fQ.fR3lsLvDWpndHQAtcCI7yNcAs7hKdAoi0pG-gKeSGdE
    ports:
      - "54323:3000"
    depends_on:
      - kong

  inbox:
    image: inbucket/inbucket:3.0.3
    container_name: pedi-ai-inbox
    environment:
      INBUCKET_WEB_PORT: 9000
      INBUCKET_SMTP_PORT: 2525
      INBUCKET_POP3_PORT: 1110
    ports:
      - "54324:9000"
      - "54325:2525"
      - "54326:1110"

  meta:
    image: supabase/postgres-meta:v0.83.2
    container_name: pedi-ai-meta
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    ports:
      - "54321:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  storage_data:
