version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pedi_ai_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pedi_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: pedi_ai_mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      - MTX_DEBUG=0

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pedi_ai_api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pedi_ai
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_EXPIRES_IN: 15m
      PORT: 3001
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./apps/api/src:/app/src:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pedi_ai_web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: pedi_ai_network
