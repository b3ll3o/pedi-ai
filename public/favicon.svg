<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D04"/>
      <stop offset="100%" style="stop-color:#F48C06"/>
    </linearGradient>
  </defs>

  <!-- Background circular -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)"/>

  <!-- Ícone simplificado de cardápio/prato com QR -->
  <g transform="translate(16, 16)">
    <!-- Prato base -->
    <ellipse rx="10" ry="3" fill="#fff" opacity="0.3"/>
    <ellipse rx="8" ry="2.5" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>

    <!-- Elemento QR simplificado -->
    <rect x="-5" y="-6" width="4" height="4" rx="0.5" fill="#fff"/>
    <rect x="1" y="-6" width="4" height="4" rx="0.5" fill="#fff"/>
    <rect x="-5" y="2" width="4" height="4" rx="0.5" fill="#fff"/>
    <rect x="1" y="2" width="4" height="4" rx="0.5" fill="#fff"/>

    <!-- Centro AI -->
    <rect x="-2" y="-2" width="4" height="4" rx="1" fill="#E85D04"/>
  </g>
</svg>