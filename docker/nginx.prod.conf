upstream api {
    server api:3001;
}

upstream web {
    server web:3000;
}

# Esconde versão do Nginx em respostas e erros. Default `server_tokens on;`
# expõe "nginx/1.x.y" no header Server e nas páginas de erro — facilita
# fingerprinting contra CVE databases.
server_tokens off;
more_clear_headers Server;

# ─── Security headers (produção) ──────────────────────────────────────────
# Em produção, TLS termination está aqui. Todos os headers passam por este
# proxy — Next.js também adiciona os mesmos headers, mas duplicação é OK
# (clientes ignoram duplicatas).
map $sent_http_content_type $is_html {
    default "";
    text/html "1";
}

# Redireciona HTTP → HTTPS (porta 80 apenas para challenge ACME).
server {
    listen 80;
    server_name andreazzi.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name andreazzi.tech;

    # ─── TLS ─────────────────────────────────────────────────
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security headers ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP básico — apenas para a resposta HTML do Next.js.
    # (CSP completa é setada pelo próprio Next.js via next.config.ts)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.mercadopago.com ws: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ─── Rate limiting (básico) ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req zone=api_limit burst=60 nodelay;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}