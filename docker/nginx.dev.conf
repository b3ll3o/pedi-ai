upstream api {
    server api:3001;
}

upstream web {
    server web:3000;
}

# Esconde versão do Nginx em respostas e erros.
server_tokens off;
more_clear_headers Server;

# Headers de segurança aplicados em TODAS as respostas.
# (Em produção, considerar mover para `nginx.prod.conf` com TLS termination.)
map $sent_http_content_type $is_html {
    default "";
    text/html "1";
}

server {
    listen 80;
    server_name andreazzi.tech;

    # ─── Security headers ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # HSTS — apenas em produção com TLS configurado.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP básico — apenas para a resposta HTML do Next.js.
    # (CSP completa é setada pelo próprio Next.js via next.config.ts)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.mercadopago.com ws: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ─── Rate limiting (básico) ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req zone=api_limit burst=60 nodelay;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}