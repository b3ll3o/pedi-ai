name: Documentation Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Toda segunda-feira às 8h
  workflow_dispatch:  # Permitir execução manual
  push:
    paths:
      - 'docs/**'
      - 'openspec/specs/**'
      - 'AGENTS.md'
      - 'codemap.md'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run Documentation Audit
        run: node scripts/audit-docs.js

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📋 Auditoria Doc: Problemas Encontrados',
              body: `A auditoria de documentação encontrou problemas.\n\nExecute \`node scripts/audit-docs.js\` para ver detalhes.\n\n### Ações necessárias:\n1. Revise o relatório da auditoria\n2. Atualize os specs/desocs afetados\n3. Commit as mudanças\n\n### Referências:\n- [Plano de Update de Docs](./docs/PLANO-UPDATE-DOCS.md)`,
              labels: ['documentation']
            })
