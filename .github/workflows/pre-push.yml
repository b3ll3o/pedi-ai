name: Pre-Push Checks

on:
  push:
    branches: [main, develop]

jobs:
  1-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "📚 Checking documentation..."
      # Update any auto-generated docs if needed

  2-tests:
    runs-on: ubuntu-latest
    needs: 1-documentation
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:e2e:seed || true  # Continue even if seed fails (CI might not have DB)

  3-lint:
    runs-on: ubuntu-latest  
    needs: 2-tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint --fix  # Auto-fix issues

  4-commit-if-clean:
    runs-on: ubuntu-latest
    needs: 3-lint
    if: always() # Always commit if we reach here, even if linter made changes
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config --local user.email "ci@pedi-ai.com"
          git config --local user.name "CI Bot"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-fix lint issues"
      - uses: ad-m/github-push-action@v0.1.0
        with:
          force_with_lease: true
