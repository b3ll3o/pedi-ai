name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Pular testes E2E'
        required: false
        type: boolean
        default: false
      shard:
        description: 'Shard (ex: 1/4, 2/4, 3/4, 4/4)'
        required: false
        type: string
      test_mode:
        description: 'Modo de execução'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - smoke
          - critical

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://pedi.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            cd pedi-ai

            # Pull latest changes
            git pull origin master

            # Stop existing services
            docker compose -f docker-compose.dev.yml down || true

            # Ensure port 80 is free (kill any process using it)
            fuser -k 80/tcp 2>/dev/null || true
            sleep 2

            # Build and start services (usa .env local)
            docker compose -f docker-compose.dev.yml up -d --build

            # Wait for postgres to be healthy first
            echo "Aguardando PostgreSQL ficar ready..."
            for i in {1..30}; do
              if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "PostgreSQL está pronto!"
                break
              fi
              echo "Aguardando... ($i/30)"
              sleep 2
            done

            # Check if API can connect to postgres (detect password mismatch)
            echo "Verificando conexão do API com banco..."
            sleep 10
            API_LOGS=$(docker compose -f docker-compose.dev.yml logs api 2>&1 | tail -20)
            if echo "$API_LOGS" | grep -q "P1000\|password authentication failed"; then
              echo "ERRO: Credenciais do banco não conferem!"
              echo "O volume do postgres foi criado com senha diferente do .env atual."
              echo "Solução: docker volume rm pedi_ai_postgres_data (apaga dados!)"
              echo "Ou: altere POSTGRES_PASSWORD no .env para match com o volume existente"
              exit 1
            fi

            # Wait for services to be healthy
            echo "Aguardando serviços ficarem healthy..."
            sleep 20

            # Verify services are running
            docker compose -f docker-compose.dev.yml ps

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: deploy
    if: ${{ github.event.inputs.skip_e2e != true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Garantir ambiente E2E rodando na VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            # Verificar se postgres está rodando
            if ! docker ps --format '{{.Names}}' | grep -q pedi_ai_postgres; then
              echo "🚀 Iniciando postgres..."
              docker compose -f docker-compose.dev.yml up -d postgres
            fi

            # Verificar se api e web estão rodando
            if ! docker ps --format '{{.Names}}' | grep -q pedi_ai_api; then
              echo "🚀 Iniciando api e web..."
              docker compose -f docker-compose.dev.yml up -d api web
            fi

            # Aguardar postgres ficar pronto
            echo "⏳ Aguardando postgres..."
            for i in {1..30}; do
              if docker exec pedi_ai_postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "✅ postgres pronto"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ postgres não ficou pronto"
                exit 1
              fi
              sleep 2
            done

            # Aguardar api ficar pronto
            echo "⏳ Aguardando api..."
            for i in {1..30}; do
              if docker exec pedi_ai_api curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
                echo "✅ api pronta"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ api não ficou pronta"
                exit 1
              fi
              sleep 2
            done

            # Aguardar web ficar pronto
            echo "⏳ Aguardando web..."
            for i in {1..30}; do
              if docker exec pedi_ai_web curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ web pronta"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ web não ficou pronta"
                exit 1
              fi
              sleep 3
            done

            echo "✅ Ambiente E2E garantido e saudável"

      - name: Reset E2E database on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            echo "🔄 Resetando banco de dados E2E..."
            docker exec pedi_ai_postgres psql -U postgres -c "DROP DATABASE IF EXISTS pedi_ai_e2e;"
            docker exec pedi_ai_postgres psql -U postgres -c "CREATE DATABASE pedi_ai_e2e;"

            echo "✅ Banco de dados E2E resetado"

      - name: Apply Prisma schema on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            docker exec pedi_ai_api bash -c "
              export DATABASE_URL='postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/pedi_ai_e2e';
              export JWT_SECRET='${JWT_SECRET}';
              export JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}';
              npx prisma db push --accept-data-loss --skip-generate && npx prisma generate;
            "

            echo "✅ Schema Prisma aplicado"

      - name: Rodar Seed na VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            export DATABASE_URL="postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/pedi_ai_e2e"
            export JWT_SECRET="${JWT_SECRET}"
            export JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET}"
            export SHARD="${{ github.event.inputs.shard || '1/1' }}"
            export CI="true"

            docker exec pedi_ai_api bash -c "cd /app && pnpm test:e2e:seed"

            echo "✅ Seed executado"

      - name: Rodar E2E tests na VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            export DATABASE_URL="postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/pedi_ai_e2e"
            export JWT_SECRET="${JWT_SECRET}"
            export JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET}"
            export NEXT_PUBLIC_API_URL="http://localhost:3001"
            export BASE_URL="http://localhost:3000"
            export NODE_ENV="e2e"
            export SHARD="${{ github.event.inputs.shard || '1/1' }}"
            export CI="true"

            # Selecionar modo de teste
            TEST_CMD="pnpm test:e2e"
            case "${{ github.event.inputs.test_mode }}" in
              smoke) TEST_CMD="pnpm test:e2e:smoke" ;;
              critical) TEST_CMD="pnpm test:e2e:critical" ;;
            esac

            # Montar comando com shard se informado
            if [ -n "${{ github.event.inputs.shard }}" ]; then
              TEST_CMD="$TEST_CMD --shard=${{ github.event.inputs.shard }}"
            fi

            # Rodar testes dentro do container web
            docker exec pedi_ai_web bash -c "cd /app && export DATABASE_URL='postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/pedi_ai_e2e' && export JWT_SECRET='${JWT_SECRET}' && export JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}' && export NEXT_PUBLIC_API_URL='http://localhost:3001' && export BASE_URL='http://localhost:3000' && export NODE_ENV='e2e' && export SHARD='${{ github.event.inputs.shard || '1/1' }}' && export CI='true' && $TEST_CMD"

      - name: Download artifacts from VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd pedi-ai

            # Criar tarball com os artifacts
            docker exec pedi_ai_web tar -czf /tmp/artifacts.tar.gz playwright-report-* test-results-* playwright-results-*.json 2>/dev/null || true
            docker cp pedi_ai_web:/tmp/artifacts.tar.gz /tmp/artifacts.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pw-e2e-vps-results
          path: /tmp/artifacts.tar.gz
          retention-days: 14