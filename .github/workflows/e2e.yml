name: E2E Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Criar .env.e2e
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_API_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Verificar conexão PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U postgres; then
              echo "PostgreSQL está pronto"
              break
            fi
            echo "Aguardando PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Setup database schema
        run: |
          cd apps/api
          npx prisma db push --accept-data-loss --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Seed database
        run: pnpm test:e2e:seed
        env:
          NODE_ENV: e2e

      - name: Run E2E tests (Shard ${{ matrix.shard }})
        run: pnpm test:e2e --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: e2e
          PLAYWRIGHT_HTML_REPORT: pw-report-shard-${{ matrix.shard }}
        continue-on-error: false

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            pw-report-shard-${{ matrix.shard }}
            test-results/
            playwright-traces/
          retention-days: 7
