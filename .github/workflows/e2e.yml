name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BASE_URL: http://localhost:3000
  NODE_VERSION: '22'

jobs:
  e2e:
    name: Playwright E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pedi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pedi-ai/e2e install:browsers

      - name: Setup environment
        run: |
          cp apps/web/.env.local.example apps/web/.env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> apps/web/.env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=test-key" >> apps/web/.env.local
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/pedi_test" >> apps/web/.env.local

      - name: Start web server
        run: pnpm --filter web dev &
        env:
          PORT: 3000
        shell: bash
        timeout-minutes: 5

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run E2E tests
        run: pnpm --filter @pedi-ai/e2e test:e2e --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: apps/e2e/playwright-results.json
          retention-days: 14

      - name: Upload Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: apps/e2e/test-results/
          retention-days: 14

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter web test --coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/web/coverage/coverage-final.json
          flags: unittests

      - name: Check coverage thresholds
        run: |
          npx vitest --filter web run --coverage && coverageReport=$(cat apps/web/coverage/coverage-summary.json)
          STATEMENTS=$(echo "$coverageReport" | jq '.result.statements.pct')
          if (( $(echo "$STATEMENTS < 80" | bc -l) )); then
            echo "Coverage $STATEMENTS% is below 80% threshold"
            exit 1
          fi
