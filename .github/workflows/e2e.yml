name: E2E Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Create .env.e2e
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.e2e
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.e2e
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.e2e
        env:
          NODE_ENV: e2e

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "::warning::E2E secrets not configured. Skipping tests."
            echo "skip_tests=true" >> $GITHUB_OUTPUT
          else
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi
        id: check-secrets

      - name: Seed database
        if: steps.check-secrets.outputs.skip_tests != 'true'
        run: pnpm test:e2e:seed
        env:
          NODE_ENV: e2e

      - name: Run E2E tests (Shard ${{ matrix.shard }})
        if: steps.check-secrets.outputs.skip_tests != 'true'
        run: pnpm test:e2e --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: e2e
          PLAYWRIGHT_HTML_REPORT: pw-report-shard-${{ matrix.shard }}
        continue-on-error: false

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            pw-report-shard-${{ matrix.shard }}
            test-results/
            playwright-traces/
          retention-days: 7
