name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar ESLint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar type-check
        run: pnpm tsc --noEmit

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes unitários
        run: pnpm test:unit

  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes de integração
        run: pnpm test:integration

  coverage:
    name: Verificar Cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar node-gyp
        run: npm install -g node-gyp

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar verificação de cobertura
        run: pnpm test:coverage

  complexity:
    name: Análise de Complexidade
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar análise de complexidade
        run: |
          echo "=== Contagem de arquivos e linhas ==="
          find apps/web/src -name "*.ts" -o -name "*.tsx" | wc -l
          find apps/web/src -name "*.ts" -o -name "*.tsx" | xargs wc -l | tail -1

          echo ""
          echo "=== Complexidade ciclomática ( ESLint ) ==="
          npx eslint apps/web/src --format json --output-file eslint-complexity-report.json 2>/dev/null || true

          echo ""
          echo "=== Funções mais complexas ==="
          npx eslint apps/web/src \
            --no-eslintrc \
            --parser @typescript-eslint/parser \
            --parser-options project:./tsconfig.json \
            --rule '{"@typescript-eslint/complexity": ["warn", { "max": 15 }]}' \
            --format table 2>/dev/null || echo "Análise de complexidade não disponível"

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, integration-tests, coverage, complexity]
    if: always()
    steps:
      - name: Verificar status final
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint falhou"
            exit 1
          fi
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ Type check falhou"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Testes unitários falharam"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Testes de integração falharam"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "❌ Coverage abaixo do limiar"
            exit 1
          fi
          if [ "${{ needs.complexity.result }}" != "success" ]; then
            echo "❌ Complexidade alta detectada"
            exit 1
          fi
          echo "✅ Todos os checks passaram"
