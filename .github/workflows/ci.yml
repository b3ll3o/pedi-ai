name: CI - Todos os Testes

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar ESLint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar type-check
        run: pnpm tsc --noEmit

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes unitários
        run: pnpm test:unit

  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes de integração
        run: pnpm test:integration

  e2e-tests:
    name: Testes E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Criar .env.e2e
        run: |
          cat > .env.e2e << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EOF

      - name: Seed database
        run: pnpm test:e2e:seed
        env:
          NODE_ENV: e2e

      - name: Executar testes E2E (Shard ${{ matrix.shard }})
        run: pnpm test:e2e --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: e2e
          PLAYWRIGHT_HTML_REPORT: pw-report-shard-${{ matrix.shard }}
        continue-on-error: false

      - name: Upload relatório Playwright
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            pw-report-shard-${{ matrix.shard }}
            test-results/
            playwright-traces/
          retention-days: 7

  coverage:
    name: Verificar Cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar verificação de cobertura
        run: pnpm test:coverage

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, integration-tests, e2e-tests, coverage]
    if: always()
    steps:
      - name: Verificar status final
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint falhou"
            exit 1
          fi
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "❌ Type check falhou"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Testes unitários falharam"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Testes de integração falharam"
            exit 1
          fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "❌ Testes E2E falharam"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "❌ Coverage abaixo do limiar"
            exit 1
          fi
          echo "✅ Todos os checks passaram"


