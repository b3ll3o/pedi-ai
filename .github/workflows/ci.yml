name: CI - Todos os Testes

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes unitários
        run: pnpm test:unit

  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes de integração
        run: pnpm test:integration

  e2e-tests:
    name: Testes E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Criar .env.e2e
        run: |
          cat > .env.e2e << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EOF

      - name: Seed database
        run: pnpm test:e2e:seed
        env:
          NODE_ENV: e2e

      - name: Iniciar servidor dev em background
        run: pnpm dev &
        env:
          NODE_ENV: e2e

      - name: Aguardar servidor dev estar pronto
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Servidor dev está pronto"
              exit 0
            fi
            echo "Aguardando servidor dev... ($i/30)"
            sleep 2
          done
          echo "Servidor dev falhou ao iniciar"
          exit 1

      - name: Executar testes E2E (Shard ${{ matrix.shard }})
        run: pnpm test:e2e --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: e2e
          PLAYWRIGHT_HTML_REPORT: pw-report-shard-${{ matrix.shard }}
        continue-on-error: false

      - name: Upload relatório Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            pw-report-shard-${{ matrix.shard }}
            test-results/
            playwright-traces/
          retention-days: 7

  coverage:
    name: Verificar Cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar verificação de cobertura
        run: pnpm test:coverage
